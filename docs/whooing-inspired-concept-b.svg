<svg width="1800" height="1240" viewBox="0 0 1800 1240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1800" y2="1240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF2EE"/>
      <stop offset="1" stop-color="#E5EAE4"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#667268" flood-opacity="0.12"/>
    </filter>
    <style>
      .hero { font: 700 40px 'Segoe UI', sans-serif; fill: #202923; }
      .sec { font: 700 24px 'Segoe UI', sans-serif; fill: #26322B; }
      .cap { font: 700 12px 'Segoe UI', sans-serif; fill: #5A7D6E; letter-spacing: 1.8px; }
      .txt { font: 500 15px 'Segoe UI', sans-serif; fill: #5D6960; }
      .mini { font: 500 12px 'Segoe UI', sans-serif; fill: #7E8881; }
      .nav { font: 600 14px 'Segoe UI', sans-serif; fill: #334138; }
      .stat { font: 700 30px 'Segoe UI', sans-serif; fill: #1E2722; }
      .label { font: 600 12px 'Segoe UI', sans-serif; fill: #6D7770; letter-spacing: 1px; }
      .btn { font: 700 14px 'Segoe UI', sans-serif; fill: #F7FAF7; }
      .ink { font: 600 14px 'Segoe UI', sans-serif; fill: #243028; }
    </style>
  </defs>

  <rect width="1800" height="1240" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1800" height="220" fill="#DDE5DD"/>
  <text x="72" y="86" class="hero">Double-entry Ledger Concept B</text>
  <text x="72" y="122" class="txt">A cleaner, more productized web-app direction that still respects the report-first discipline of Whooing.</text>

  <rect x="72" y="154" width="1656" height="42" rx="20" fill="#F7FAF7" stroke="#CBD5CB"/>
  <text x="96" y="180" class="cap">KEYWORDS</text>
  <text x="220" y="180" class="txt">Account tree, net-worth reporting, clean tables, monthly review, calm productivity UI.</text>

  <text x="72" y="262" class="sec">Web-first Main</text>
  <g filter="url(#shadow2)"><rect x="72" y="286" width="1080" height="700" rx="28" fill="#F8FBF8" stroke="#CFD7CF"/></g>
  <rect x="96" y="310" width="1032" height="56" rx="22" fill="#FFFFFF" stroke="#D4DCD4"/>
  <text x="122" y="346" class="sec" style="font-size:22px;">AccountBook</text>
  <text x="544" y="346" class="nav">Overview</text>
  <text x="636" y="346" class="nav">Journal</text>
  <text x="726" y="346" class="nav">Reports</text>
  <text x="818" y="346" class="nav">Accounts</text>
  <rect x="982" y="322" width="122" height="32" rx="16" fill="#527A68"/>
  <text x="1018" y="343" class="btn">New Entry</text>

  <rect x="96" y="392" width="210" height="570" rx="22" fill="#EEF3EE" stroke="#D4DDD4"/>
  <text x="120" y="426" class="cap">SECTIONS</text>
  <rect x="120" y="454" width="162" height="50" rx="16" fill="#DDE7DE"/>
  <text x="142" y="485" class="ink">Quick entry</text>
  <rect x="120" y="516" width="162" height="50" rx="16" fill="#F8FBF8" stroke="#D4DDD4"/>
  <text x="142" y="547" class="ink">Journal view</text>
  <rect x="120" y="578" width="162" height="50" rx="16" fill="#F8FBF8" stroke="#D4DDD4"/>
  <text x="142" y="609" class="ink">Net worth report</text>
  <rect x="120" y="640" width="162" height="50" rx="16" fill="#F8FBF8" stroke="#D4DDD4"/>
  <text x="142" y="671" class="ink">Account setup</text>
  <rect x="120" y="734" width="162" height="196" rx="18" fill="#F8FBF8" stroke="#D4DDD4"/>
  <text x="142" y="768" class="cap">ACCOUNT TREE</text>
  <text x="142" y="800" class="txt">Assets</text>
  <text x="142" y="826" class="txt">Liabilities</text>
  <text x="142" y="852" class="txt">Income</text>
  <text x="142" y="878" class="txt">Expenses</text>

  <rect x="330" y="392" width="798" height="148" rx="24" fill="#263A30"/>
  <text x="360" y="426" class="cap" fill="#BDD2C6">SUMMARY</text>
  <text x="360" y="472" style="font:700 34px 'Segoe UI', sans-serif; fill:#F7FAF7;">A double-entry home that keeps input and reports in one rhythm</text>
  <text x="360" y="504" style="font:500 15px 'Segoe UI', sans-serif; fill:#DBE7DE;">The layout borrows Whooing's structure but feels more like a modern web product.</text>

  <rect x="330" y="568" width="184" height="104" rx="20" fill="#FFFFFF" stroke="#D4DDD4"/>
  <rect x="534" y="568" width="184" height="104" rx="20" fill="#FFFFFF" stroke="#D4DDD4"/>
  <rect x="738" y="568" width="184" height="104" rx="20" fill="#FFFFFF" stroke="#D4DDD4"/>
  <rect x="942" y="568" width="186" height="104" rx="20" fill="#FFFFFF" stroke="#D4DDD4"/>
  <text x="354" y="598" class="label">NET ASSET</text><text x="354" y="640" class="stat">23.4M</text>
  <text x="558" y="598" class="label">LIABILITY</text><text x="558" y="640" class="stat">3.2M</text>
  <text x="762" y="598" class="label">MONTHLY IN</text><text x="762" y="640" class="stat">3.8M</text>
  <text x="966" y="598" class="label">MONTHLY OUT</text><text x="966" y="640" class="stat">1.9M</text>

  <rect x="330" y="700" width="374" height="262" rx="24" fill="#FFFFFF" stroke="#D4DDD4"/>
  <text x="356" y="736" class="sec" style="font-size:22px;">Quick entry</text>
  <text x="356" y="762" class="mini">The left-right account model stays visible from the first glance.</text>
  <rect x="356" y="790" width="322" height="40" rx="14" fill="#F8FBF8" stroke="#D4DDD4"/>
  <rect x="356" y="844" width="154" height="40" rx="14" fill="#F8FBF8" stroke="#D4DDD4"/>
  <rect x="524" y="844" width="154" height="40" rx="14" fill="#F8FBF8" stroke="#D4DDD4"/>
  <rect x="356" y="898" width="154" height="40" rx="14" fill="#F8FBF8" stroke="#D4DDD4"/>
