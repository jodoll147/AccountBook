  <text x="836" y="932" class="mini">Expense</text>

  <text x="1200" y="262" class="sec">Mobile Entry and Setup</text>
  <g filter="url(#shadow2)"><rect x="1200" y="286" width="240" height="520" rx="34" fill="#F8FBF8" stroke="#CFD7CF"/></g>
  <rect x="1218" y="312" width="204" height="36" rx="16" fill="#FFFFFF" stroke="#D4DCD4"/>
  <text x="1240" y="336" class="ink">Today</text>
  <rect x="1218" y="368" width="204" height="86" rx="20" fill="#263A30"/>
  <text x="1238" y="398" class="cap" fill="#BDD2C6">DOUBLE ENTRY</text>
  <text x="1238" y="430" style="font:700 24px 'Segoe UI', sans-serif; fill:#F7FAF7;">Lunch 18,000</text>
  <rect x="1218" y="474" width="96" height="38" rx="14" fill="#FFFFFF" stroke="#D4DDD4"/>
  <rect x="1326" y="474" width="96" height="38" rx="14" fill="#FFFFFF" stroke="#D4DDD4"/>
  <rect x="1218" y="528" width="204" height="40" rx="16" fill="#527A68"/>
  <text x="1292" y="553" class="btn">Save</text>
  <rect x="1218" y="596" width="204" height="186" rx="20" fill="#EEF3EE" stroke="#D4DDD4"/>
  <text x="1238" y="626" class="cap">ACCOUNT SETUP</text>
  <text x="1238" y="658" class="txt">Assets</text>
  <text x="1238" y="686" class="txt">Liabilities</text>
  <text x="1238" y="714" class="txt">Income</text>
  <text x="1238" y="742" class="txt">Expenses</text>

  <g filter="url(#shadow2)"><rect x="1472" y="286" width="256" height="520" rx="30" fill="#F8FBF8" stroke="#CFD7CF"/></g>
  <text x="1496" y="324" class="sec" style="font-size:22px;">Direction notes</text>
  <text x="1496" y="362" class="txt">1. Choose calm order over flashy gradients.</text>
  <text x="1496" y="402" class="txt">2. Keep the account tree visible in product architecture.</text>
  <text x="1496" y="442" class="txt">3. Let reports, journal, and setup feel like one system.</text>
  <rect x="1496" y="570" width="142" height="34" rx="17" fill="#DDE7DE"/>
  <text x="1520" y="592" class="ink">Report-first UI</text>
  <rect x="1496" y="620" width="164" height="34" rx="17" fill="#EADFCC"/>
  <text x="1522" y="642" class="ink">Whooing-inspired</text>

  <text x="72" y="1068" class="sec">Summary</text>
  <text x="72" y="1102" class="txt">Concept B feels more like a shippable web product while still keeping the journal and report discipline of double-entry accounting.</text>
</svg>
