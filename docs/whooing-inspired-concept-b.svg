  <rect x="356" y="948" width="322" height="40" rx="16" fill="#527A68"/>
  <text x="474" y="973" class="btn">Save entry</text>

  <rect x="726" y="700" width="402" height="262" rx="24" fill="#FFFFFF" stroke="#D4DDD4"/>
  <text x="752" y="736" class="sec" style="font-size:22px;">Report preview</text>
  <line x1="752" y1="790" x2="1102" y2="790" stroke="#D8E0D8"/>
  <path d="M760 902 C804 878 830 894 870 862 C910 830 940 844 978 818 C1010 796 1046 804 1092 760" stroke="#527A68" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M760 922 C814 910 846 914 884 896 C930 874 962 888 998 870 C1034 854 1066 864 1092 846" stroke="#C3B08A" stroke-width="4" fill="none" stroke-linecap="round"/>
