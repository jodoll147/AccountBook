  <text x="72" y="1062" class="section">What This Board Covers</text>
  <text x="72" y="1094" class="body">Desktop app keeps the current WPF shell: header, sidebar, input-first workflow, analysis charts, settings cards.</text>
  <text x="72" y="1120" class="body">Web expands the same design system into a browser-native dashboard with responsive tablet and mobile layouts.</text>
  <text x="72" y="1146" class="body">Best next step: use this image as a visual brief, then create matching Figma frames for Desktop / Web / Mobile.</text>
