<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081018"/>
      <stop offset="1" stop-color="#13222D"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1A8EAF"/>
      <stop offset="1" stop-color="#0E6C88"/>
    </linearGradient>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#182530"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 700 40px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #EEF5F7; }
      .subtitle { font: 500 18px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #8FA7B5; }
      .section { font: 700 22px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #EEF5F7; }
      .label { font: 600 13px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #FFC96B; letter-spacing: 1.6px; }
      .body { font: 500 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #8FA7B5; }
      .metricLabel { font: 500 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #8FA7B5; }
      .metricValue { font: 700 24px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #EEF5F7; }
      .small { font: 500 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #6B808D; }
      .chip { font: 600 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #FFC96B; }
      .cardTitle { font: 700 18px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #EEF5F7; }
      .nav { font: 600 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #EEF5F7; }
      .button { font: 700 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #1D1200; }
      .buttonSecondary { font: 700 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #EEF5F7; }
    </style>
